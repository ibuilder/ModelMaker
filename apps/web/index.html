<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEC BIM Viewer</title>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <button id="sidebar-toggle" title="Toggle panel (\\)" aria-label="Toggle panel">☰</button>
        <strong>AEC BIM Viewer</strong>
        <label class="file-btn">Open IFC<input id="ifc-input" type="file" accept=".ifc" hidden /></label>
        <label class="file-btn">Open .frag<input id="frag-input" type="file" accept=".frag" hidden /></label>
        <label id="persona-wrap" title="Show tools for your role">
          <select id="persona">
            <option value="all">All roles</option>
            <option value="developer">Developer</option>
            <option value="gc">General Contractor</option>
            <option value="architect">Architect</option>
            <option value="engineer">Engineer</option>
            <option value="subcontractor">Subcontractor</option>
          </select>
        </label>
        <span id="status">ready</span>
      </header>

      <nav id="sidebar">
        <div id="tabs">
          <button class="tab active" data-tab="tree">Tree</button>
          <button class="tab" data-tab="layers">Layers</button>
          <button class="tab" data-tab="issues">Issues</button>
          <button class="tab" data-tab="tools">Tools</button>
          <button class="tab" data-tab="portal">Portal</button>
          <button class="tab" data-tab="proforma">Proforma</button>
          <button class="tab" data-tab="portfolio">Portfolio</button>
        </div>
        <div id="panel-tree" class="panel active"></div>
        <div id="panel-layers" class="panel"></div>
        <div id="panel-issues" class="panel"></div>
        <div id="panel-tools" class="panel"></div>
        <div id="panel-portal" class="panel"></div>
        <div id="panel-proforma" class="panel"></div>
        <div id="panel-portfolio" class="panel"></div>
      </nav>

      <div id="container"></div>

      <aside id="props" hidden>
        <h3>Properties</h3>
        <pre id="props-body"></pre>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
