name: Dependency scan

# Report-only supply-chain scan (pip-audit + npm audit). Non-blocking by design — it surfaces
# known CVEs in the job summary without failing the merge gate (ci.yml stays the hard gate).
# Runs weekly and on dependency-manifest changes.

on:
  schedule:
    - cron: "0 6 * * 1"          # Mondays 06:00 UTC
  push:
    branches: [main]
    paths:
      - "**/requirements*.txt"
      - "**/package.json"
      - "**/package-lock.json"
      - ".github/workflows/security.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pip-audit
      - name: pip-audit (api + data)
        continue-on-error: true        # report-only
        run: |
          for req in services/api/requirements.txt services/data/requirements.txt; do
            echo "## $req" >> "$GITHUB_STEP_SUMMARY"
            pip-audit -r "$req" --desc --format markdown >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          done

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: package-lock.json }
      - run: npm ci
      - name: npm audit (production deps)
        continue-on-error: true        # report-only
        run: |
          echo "## npm audit (prod)" >> "$GITHUB_STEP_SUMMARY"
          npm audit --omit=dev >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
